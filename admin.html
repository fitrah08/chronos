<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos • Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    /* Avatar Upload Styles */
    .avatar-upload-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    .avatar-preview-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #fff;
      object-fit: cover;
      margin-bottom: 12px;
      border: 3px solid var(--border2);
    }
    .upload-btn-small {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-btn-small:hover {
      background: var(--accent);
      color: #fff;
    }
    .remove-photo-btn {
      color: var(--danger);
      font-size: 11px;
      cursor: pointer;
      margin-top: 6px;
    }
    .remove-photo-btn:hover {
      text-decoration: underline;
    }
    .user-avatar-small {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1 class="admin-title">Chronos Admin</h1>
        <p style="color:var(--text2);margin-top:4px">Manage users and view system stats</p>
      </div>
      <div class="admin-user">
        <div class="admin-info">
          <div class="admin-name" id="adminName">Fitrah</div>
          <div class="admin-role" id="adminRole">Super Admin</div>
        </div>
        <button class="btn btn-ghost" onclick="logout()">🚪 Logout</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Today</div>
        <div class="stat-value" id="activeToday">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Quests</div>
        <div class="stat-value" id="totalQuests">0</div>
      </div>
    </div>

    <div class="users-table">
      <div class="table-header">
        <h2 class="table-title">User Management</h2>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Level</th>
              <th>XP</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Edit User</h3>
        <button class="modal-close" onclick="closeModal('userModal')">✕</button>
      </div>
      <form onsubmit="saveUser();return false">
        <!-- Upload Foto -->
        <div class="avatar-upload-area">
          <img class="avatar-preview-large" id="adminAvatarPreviewImg" alt="Preview" style="display:none;">
          <div class="avatar-preview-large" id="adminAvatarPreviewText">U</div>
          
          <button type="button" class="upload-btn-small" onclick="document.getElementById('adminPhotoUpload').click()">
            📷 Choose Photo
          </button>
          <input type="file" id="adminPhotoUpload" accept="image/*" style="display:none;" onchange="handleAdminPhotoUpload(event)">
          
          <span class="remove-photo-btn" onclick="removeAdminPhoto()" id="adminRemovePhotoBtn" style="display:none;">
            Remove Photo
          </span>
        </div>
        
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" id="userFullName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="userUsername" placeholder="johndoe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="userEmail" type="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone (Optional)</label>
          <input class="form-input" id="userPhone" placeholder="08123456789">
        </div>
        <div class="form-group">
          <label class="form-label">New Password (Optional)</label>
          <input class="form-input" id="userPassword" type="password" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-input" id="userRole">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px">
          <button type="button" class="btn btn-ghost" onclick="closeModal('userModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3 class="modal-title">Confirm Delete</h3>
        <button class="modal-close" onclick="closeModal('deleteModal')">✕</button>
      </div>
      <p style="color:var(--text2);margin-bottom:20px;text-align:center">Are you sure you want to delete this user?<br>This action cannot be undone.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-ghost" onclick="closeModal('deleteModal')">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete User</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
